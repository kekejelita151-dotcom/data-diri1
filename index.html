<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Diri</title>
    <style>
        body {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 20px;
            padding: 20px;  
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 650PX;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .profile-img {
            display: block;
            margin: 0 auto 25px auto;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3498db;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border: 1px solid #ddd;
        }
        td {
            padding: 10px 8px; 
            vertical-align: top;
            border: 1px solid #ddd;
        }
        .label {
            font-weight: bold;
            color: #2c3e50;
            width: 30%;
            background-color: #f9f9f9;
        }
        .titik-dua {
            width: 5%;
            text-align: center;
            background-color: #f9f9f9;
        }
        .value {
            width: 65%;
        }
    </style>
</head>
<body>
    
<div class="container"> 
    <h1>Biodata Diri</h1>

    <img src="profile.png" alt="Foto Profil" class="profile-img">

    <table>
        <tr>
            <td class="label">Nama Lengkap</td>
            <td class="titik-dua">:</td>
            <td class="value">Jelita keke Nurcahya</td>
        </tr>
        <tr>
            <td class="label">Tempat, Tanggal Lahir</td>
            <td class="titik-dua">:</td>
            <td class="value">Sukabumi, 21-oktober-2011</td>
        </tr>
        <tr>
            <td class="label">Jenis Kelamin</td>
            <td class="titik-dua">:</td>
            <td class="value">perempuan</td>
        </tr>
        <tr>
            <td class="label">Pendidikan</td>
            <td class="titik-dua">:</td>
            <td class="value">MTS Terpadu Yapisa Cibareno</td>
        </tr>
        <tr>
            <td class="label">Hobi</td>
            <td class="titik-dua">:</td>
            <td class="value">Menggambar</td>
        </tr>
    </table>
</div>

</body>
</html>
